<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高考英语高频词汇·闯关记忆</title>
<style>
:root {
  --bg: #f5f0eb;
  --card: #ffffff;
  --primary: #c0392b;
  --accent: #e74c3c;
  --gold: #d4a017;
  --green: #27ae60;
  --blue: #2980b9;
  --text: #2c3e50;
  --sub: #7f8c8d;
  --border: #e8e0d5;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image: radial-gradient(ellipse at 20% 20%, #fdf2e9 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 80%, #fef9e7 0%, transparent 50%);
}

/* Header */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #fff;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.15);
}
.header .title {
  font-size: 1.4em;
  font-weight: 800;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header .title .icon { font-size: 1.6em; }
.days-left {
  background: var(--accent);
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 0.85em;
  font-weight: 700;
  white-space: nowrap;
}

/* Main Layout */
.container { max-width: 800px; margin: 0 auto; padding: 16px; }

/* Stats Bar */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--card);
  border-radius: 14px;
  padding: 14px 10px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.stat-card .num {
  font-size: 1.6em;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-card .label { font-size: 0.75em; color: var(--sub); margin-top: 2px; }

/* Progress */
.progress-section {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.progress-section h3 {
  font-size: 0.9em;
  color: var(--sub);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}
.progress-bar-outer {
  height: 10px;
  background: #e8e0d5;
  border-radius: 10px;
  overflow: hidden;
}
.progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--green), #2ecc71);
  border-radius: 10px;
  transition: width 0.5s ease;
}
.level-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.level-badge {
  flex: 1;
  text-align: center;
  padding: 8px 4px;
  border-radius: 10px;
  font-size: 0.75em;
  font-weight: 700;
  border: 2px solid var(--border);
  transition: all 0.3s;
}
.level-badge.active { border-color: var(--primary); background: #fdf2f2; }
.level-badge.unlocked { border-color: var(--green); background: #eafaf1; }
.level-badge.locked { opacity: 0.5; }
.level-badge .star { font-size: 1.2em; }

/* Game Area */
.game-area {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  min-height: 320px;
  position: relative;
}
.word-display {
  text-align: center;
  margin-bottom: 20px;
}
.word-big {
  font-size: 2.6em;
  font-weight: 800;
  color: #1a1a2e;
  letter-spacing: 2px;
  margin-bottom: 6px;
  word-break: break-all;
}
.word-phonetic {
  font-size: 0.9em;
  color: var(--sub);
  margin-bottom: 4px;
}
.word-hint {
  font-size: 0.8em;
  color: var(--blue);
  font-style: italic;
}
.question-prompt {
  font-size: 1.1em;
  color: var(--sub);
  margin: 16px 0 4px;
  text-align: center;
}
.question-target {
  font-size: 2em;
  font-weight: 700;
  text-align: center;
  color: #1a1a2e;
  margin-bottom: 20px;
}

/* Options */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.option-btn {
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: #fff;
  font-size: 1em;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  font-family: inherit;
  font-weight: 500;
}
.option-btn:hover { border-color: var(--blue); background: #f0f7ff; transform: translateY(-1px); }
.option-btn.correct { border-color: var(--green); background: #d5f5e3; animation: pulse 0.5s; }
.option-btn.wrong { border-color: var(--accent); background: #fadbd8; animation: shake 0.5s; }
.option-btn:disabled { pointer-events: none; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* Input mode */
.input-area {
  display: flex;
  gap: 10px;
  align-items: center;
}
.input-area input {
  flex: 1;
  padding: 14px 18px;
  font-size: 1.1em;
  border: 2px solid var(--border);
  border-radius: 12px;
  outline: none;
  font-family: inherit;
  transition: border 0.2s;
}
.input-area input:focus { border-color: var(--blue); }
.input-area button {
  padding: 14px 28px;
  border: none;
  background: var(--primary);
  color: #fff;
  border-radius: 12px;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.input-area button:hover { background: var(--accent); transform: translateY(-1px); }

/* Feedback */
.feedback {
  text-align: center;
  padding: 16px;
  margin-top: 12px;
  border-radius: 12px;
  font-weight: 700;
  display: none;
}
.feedback.show { display: block; animation: fadeIn 0.3s; }
.feedback.correct-fb { background: #d5f5e3; color: #1e8449; }
.feedback.wrong-fb { background: #fadbd8; color: #c0392b; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

/* Control buttons */
.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 16px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 24px;
  border-radius: 25px;
  font-size: 0.9em;
  font-weight: 700;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: all 0.2s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--accent); transform: translateY(-1px); }
.btn-outline { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
.btn-outline:hover { background: #fdf2f2; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #229954; transform: translateY(-1px); }

/* Mode toggle */
.mode-toggle {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-bottom: 16px;
}
.mode-btn {
  padding: 8px 20px;
  border: 2px solid var(--border);
  border-radius: 20px;
  background: #fff;
  font-size: 0.85em;
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  transition: all 0.2s;
}
.mode-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Result screen */
.result-screen {
  text-align: center;
  padding: 30px 20px;
}
.result-screen .big-emoji { font-size: 4em; margin-bottom: 12px; }
.result-screen h2 { font-size: 1.5em; margin-bottom: 8px; }
.result-screen .score { font-size: 2.5em; font-weight: 800; color: var(--gold); }
.result-screen .detail { color: var(--sub); margin: 12px 0 20px; line-height: 1.8; }

/* Word list */
.word-list-panel {
  margin-top: 16px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.word-list-panel h3 { margin-bottom: 10px; font-size: 0.95em; color: var(--text); }
.word-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.word-tag {
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 0.78em;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: #fff;
  transition: all 0.2s;
}
.word-tag.mastered { background: #d5f5e3; border-color: var(--green); color: #1e8449; }
.word-tag.learning { background: #fef9e7; border-color: var(--gold); color: #b7950b; }
.word-tag.new { background: #f5f5f5; border-color: #ddd; color: #999; }

/* Responsive */
@media (max-width: 500px) {
  .stats-bar { grid-template-columns: repeat(2,1fr); }
  .options-grid { grid-template-columns: 1fr; }
  .word-big { font-size: 2em; }
  .header .title { font-size: 1.1em; }
}
</style>
</head>
<body>

<div class="header">
  <div class="title">
    <span class="icon">📚</span>
    <span>高考英语·高频词汇闯关</span>
  </div>
  <div class="days-left" id="daysLeft">距高考仅剩 -- 天</div>
</div>

<div class="container">
  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card"><div class="num" id="statMastered">0</div><div class="label">已掌握</div></div>
    <div class="stat-card"><div class="num" id="statStreak">0</div><div class="label">连续正确</div></div>
    <div class="stat-card"><div class="num" id="statAccuracy">0%</div><div class="label">正确率</div></div>
    <div class="stat-card"><div class="num" id="statToday">0</div><div class="label">今日练习</div></div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <h3><span>📊 掌握进度</span><span id="progressPct">0%</span></h3>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
    <div class="level-row" id="levelRow"></div>
  </div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="switchMode('choice')">🎯 英译中（选择）</button>
    <button class="mode-btn" onclick="switchMode('spell')">✏️ 中译英（拼写）</button>
  </div>

  <!-- Game Area -->
  <div class="game-area" id="gameArea">
    <div style="text-align:center;padding:60px 20px;color:var(--sub);">
      <div style="font-size:3em;margin-bottom:16px;">🎮</div>
      <h2 style="margin-bottom:8px;">准备开始闯关</h2>
      <p style="margin-bottom:20px;">精选近5年高考最高频词汇，智能重复记忆</p>
      <button class="btn btn-primary" onclick="startGame()" style="font-size:1.1em;padding:12px 36px;">🚀 开始闯关</button>
    </div>
  </div>

  <div class="controls" id="controls" style="display:none;">
    <button class="btn btn-outline" onclick="skipWord()">⏭ 跳过</button>
    <button class="btn btn-outline" onclick="endSession()">📋 结束本轮</button>
    <button class="btn btn-green" onclick="startGame()">🔄 重新开始</button>
  </div>

  <!-- Word List -->
  <div class="word-list-panel" id="wordListPanel" style="display:none;">
    <h3>📝 本轮词汇掌握情况 <span style="font-size:0.8em;color:var(--sub);" id="wordCount"></span></h3>
    <div class="word-tags" id="wordTags"></div>
  </div>
</div>

// ==================== 游戏引擎 ====================
let words = []; // 当前等级的所有单词
let currentWordIdx = -1;
let currentMode = 'choice'; // 'choice' or 'spell'
let sessionWords = []; // 本轮会话中出现的单词
let sessionCorrect = 0;
let sessionWrong = 0;
let currentStreak = 0;
let bestStreak = 0;
let todayCount = 0;
let currentLevel = 1;
let isAnswering = false;

// 单词状态: { en: { box: 1-5, correct: n, wrong: n, lastSeen: timestamp } }
let wordState = {};

// ==================== 初始化 ====================
function init() {
  loadState();
  updateStats();
  renderLevelBadges();
  calcDaysLeft();
}

function calcDaysLeft() {
  const now = new Date();
  const gaokao = new Date(2026, 5, 7); // June 7, 2026
  const diff = Math.ceil((gaokao - now) / (1000 * 60 * 60 * 24));
  document.getElementById('daysLeft').textContent = 
    diff > 0 ? `距高考仅剩 ${diff} 天` : '高考进行中，加油！';
}

function loadState() {
  const saved = localStorage.getItem('gaokao_vocab_state');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      wordState = data.wordState || {};
      currentLevel = data.currentLevel || 1;
      bestStreak = data.bestStreak || 0;
      const today = new Date().toDateString();
      if (data.lastDate !== today) {
        todayCount = 0;
      } else {
        todayCount = data.todayCount || 0;
      }
    } catch(e) { /* reset */ }
  }
}

function saveState() {
  const data = {
    wordState,
    currentLevel,
    bestStreak,
    todayCount,
    lastDate: new Date().toDateString()
  };
  localStorage.setItem('gaokao_vocab_state', JSON.stringify(data));
}

function getWordStatus(en) {
  return wordState[en] || { box: 1, correct: 0, wrong: 0, lastSeen: 0 };
}

function updateWordStatus(en, isCorrect) {
  const s = getWordStatus(en);
  if (isCorrect) {
    s.correct++;
    s.box = Math.min(5, s.box + 1);
  } else {
    s.wrong++;
    s.box = Math.max(1, s.box - 1);
  }
  s.lastSeen = Date.now();
  wordState[en] = s;
  saveState();
}

function getWeightedWords(wordList, count) {
  // 基于box权重选词：box越低权重越高（未掌握的更频繁出现）
  const weighted = wordList.map(w => {
    const s = getWordStatus(w.en);
    const weight = 6 - s.box; // box1→5, box5→1
    return { word: w, weight: Math.max(1, weight) };
  });
  // 优先选box<=2的（不熟悉），然后补充box高的
  const unfamiliar = weighted.filter(w => w.weight >= 4);
  const familiar = weighted.filter(w => w.weight < 4);
  // 打乱
  const shuffle = arr => arr.sort(() => Math.random() - 0.5);
  const selected = [];
  // 70%不熟悉的，30%熟悉的（用于巩固）
  const unfamiliarCount = Math.floor(count * 0.7);
  selected.push(...shuffle(unfamiliar).slice(0, unfamiliarCount));
  selected.push(...shuffle(familiar).slice(0, count - selected.length));
  // 如果还不够，从不熟悉池补充
  if (selected.length < count) {
    const remaining = shuffle(unfamiliar.filter(w => !selected.includes(w)));
    selected.push(...remaining.slice(0, count - selected.length));
  }
  return shuffle(selected.map(s => s.word));
}

// ==================== 游戏流程 ====================
function getWordsForLevel(level) {
  let all = [];
  if (level >= 1) all = all.concat(WORD_BANK.level1);
  if (level >= 2) all = all.concat(WORD_BANK.level2);
  if (level >= 3) all = all.concat(WORD_BANK.level3);
  return all;
}

function startGame() {
  const allWords = getWordsForLevel(currentLevel);
  words = getWeightedWords(allWords, 25); // 每轮25个词
  sessionWords = [];
  sessionCorrect = 0;
  sessionWrong = 0;
  currentStreak = 0;
  currentWordIdx = -1;
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('wordListPanel').style.display = 'none';
  nextWord();
}

function nextWord() {
  if (currentWordIdx >= words.length - 1) {
    showResults();
    return;
  }
  currentWordIdx++;
  isAnswering = true;
  const word = words[currentWordIdx];
  renderQuestion(word);
}

function renderQuestion(word) {
  const area = document.getElementById('gameArea');
  const feedbackDiv = document.createElement('div');
  feedbackDiv.className = 'feedback';
  feedbackDiv.id = 'feedbackMsg';
  
  if (currentMode === 'choice') {
    // 英译中选择
    const options = generateOptions(word, 4);
    area.innerHTML = `
      <div class="word-display">
        <div class="word-big">${word.en} ${word.tag ? '<span style="font-size:0.4em;background:#e74c3c;color:#fff;padding:2px 8px;border-radius:10px;vertical-align:middle;margin-left:6px;">' + word.tag + '</span>' : ''}</div>
        <div class="word-phonetic">${word.phonetic}</div>
        <div class="question-prompt">请选择正确的中文释义：</div>
      </div>
      <div class="options-grid">
        ${options.map((opt,i) => `
          <button class="option-btn" onclick="checkAnswer('${i}', '${opt.en}', event)" data-idx="${i}">
            ${opt.zh}
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedbackMsg"></div>
    `;
  } else {
    // 中译英拼写模式
    area.innerHTML = `
      <div class="word-display">
        <div class="question-prompt">请根据中文释义拼写英文单词：</div>
        <div class="question-target">${word.zh} ${word.tag ? '<span style="font-size:0.4em;background:#e74c3c;color:#fff;padding:2px 8px;border-radius:10px;vertical-align:middle;margin-left:6px;">' + word.tag + '</span>' : ''}</div>
        ${word.phonetic ? `<div class="word-hint">音标提示：${word.phonetic}</div>` : ''}
      </div>
      <div class="input-area">
        <input type="text" id="spellInput" placeholder="输入英文单词..." autocomplete="off" autofocus>
        <button onclick="checkSpell()">确认</button>
      </div>
      <div class="feedback" id="feedbackMsg"></div>
    `;
    
    // 回车提交
    setTimeout(() => {
      const inp = document.getElementById('spellInput');
      if (inp) {
        inp.focus();
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkSpell(); });
      }
    }, 100);
  }
}

function generateOptions(correct, count) {
  const allEn = Object.keys(wordState).length > 0 ? 
    Object.keys(wordState) : getWordsForLevel(3).map(w => w.en);
  
  // 选3个不同的干扰项
  const distractors = [];
  const pool = getWordsForLevel(currentLevel).filter(w => w.en !== correct.en);
  const shuffled = pool.sort(() => Math.random() - 0.5);
  
  for (let w of shuffled) {
    if (distractors.length >= count - 1) break;
    if (!distractors.find(d => d.zh === w.zh)) {
      distractors.push(w);
    }
  }
  
  const options = [correct, ...distractors];
  return options.sort(() => Math.random() - 0.5);
}

function checkAnswer(idx, en, event) {
  if (!isAnswering) return;
  isAnswering = false;
  
  const word = words[currentWordIdx];
  const isCorrect = (en === word.en);
  
  // 高亮按钮
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => {
    b.disabled = true;
    const bEn = b.getAttribute('onclick').match(/'([^']+)'/);
    if (bEn && bEn[1] === word.en) b.classList.add('correct');
    if (b.getAttribute('data-idx') === idx && !isCorrect) b.classList.add('wrong');
  });
  
  showFeedback(isCorrect, word);
}

function checkSpell() {
  if (!isAnswering) return;
  const input = document.getElementById('spellInput');
  if (!input) return;
  const answer = input.value.trim().toLowerCase();
  if (!answer) return;
  
  isAnswering = false;
  const word = words[currentWordIdx];
  const isCorrect = (answer === word.en.toLowerCase());
  document.getElementById('spellInput').disabled = true;
  
  showFeedback(isCorrect, word);
}

function showFeedback(isCorrect, word) {
  const fb = document.getElementById('feedbackMsg');
  if (!fb) return;
  
  fb.className = 'feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  
  if (isCorrect) {
    sessionCorrect++;
    currentStreak++;
    if (currentStreak > bestStreak) bestStreak = currentStreak;
    const extraInfo = word.tag ? `<br><span style="font-size:0.85em;color:var(--primary)">⚠️ ${word.tag}词 — 此前试卷中曾写错，务必巩固</span>` : '';
    fb.innerHTML = `
      ✅ 正确！ <strong>${word.en}</strong> = ${word.zh}
      ${currentStreak >= 5 ? '<br>🔥 连续正确 ' + currentStreak + ' 题！太棒了！' : ''}
      ${extraInfo}
      <br><button class="btn btn-green" onclick="nextWord()" style="margin-top:10px;font-size:0.9em;">下一题 →</button>
    `;
  } else {
    sessionWrong++;
    currentStreak = 0;
    const verbHint = (word.en==='teach')?' 过去式：taught':(word.en==='think')?' 过去式：thought':(word.en==='catch')?' 过去式：caught':(word.en==='lose')?' 过去式：lost':'';
    const extraInfo = word.tag ? `<br><span style="font-size:0.85em;color:var(--primary)">⚠️ ${word.tag}词${verbHint} — 此前试卷中曾写错，务必巩固</span>` : '';
    fb.innerHTML = `
      ❌ 答案是：<strong>${word.en}</strong> = ${word.zh}
      <br><span style="font-size:0.9em;color:#888">${word.phonetic}</span>
      ${extraInfo}
      <br><button class="btn btn-primary" onclick="nextWord()" style="margin-top:10px;font-size:0.9em;">记住了，下一题 →</button>
    `;
  }
  
  todayCount++;
  updateWordStatus(word.en, isCorrect);
  updateStats();
  
  // 记录本轮词汇
  if (!sessionWords.find(w => w.en === word.en)) {
    sessionWords.push({...word, status: isCorrect ? 'mastered' : 'learning'});
  } else {
    const sw = sessionWords.find(w => w.en === word.en);
    if (isCorrect) sw.status = 'mastered';
  }
}

function skipWord() {
  if (!isAnswering) return;
  isAnswering = false;
  const word = words[currentWordIdx];
  updateWordStatus(word.en, false);
  todayCount++;
  updateStats();
  if (!sessionWords.find(w => w.en === word.en)) {
    sessionWords.push({...word, status: 'learning'});
  }
  nextWord();
}

function endSession() {
  isAnswering = false;
  showResults();
}

function showResults() {
  document.getElementById('controls').style.display = 'none';
  const total = sessionCorrect + sessionWrong;
  const accuracy = total > 0 ? Math.round(sessionCorrect / total * 100) : 0;
  
  let emoji = '💪';
  let msg = '继续加油！';
  if (accuracy >= 90) { emoji = '🌟'; msg = '非常出色！'; }
  else if (accuracy >= 75) { emoji = '👏'; msg = '做得很好！'; }
  else if (accuracy >= 60) { emoji = '📖'; msg = '稳步提升中！'; }
  
  document.getElementById('gameArea').innerHTML = `
    <div class="result-screen">
      <div class="big-emoji">${emoji}</div>
      <h2>${msg}</h2>
      <div class="score">${accuracy}%</div>
      <div class="detail">
        正确 <strong style="color:var(--green)">${sessionCorrect}</strong> 题 · 
        错误 <strong style="color:var(--accent)">${sessionWrong}</strong> 题 · 
        共 <strong>${total}</strong> 题<br>
        连续正确 <strong>${bestStreak}</strong> 题 · 
        今日累计 <strong>${todayCount}</strong> 题
      </div>
      <button class="btn btn-primary" onclick="startGame()" style="font-size:1.1em;padding:12px 36px;">
        🔄 再来一轮
      </button>
    </div>
  `;
  
  updateStats();
  renderWordList();
}

function renderWordList() {
  const panel = document.getElementById('wordListPanel');
  const tags = document.getElementById('wordTags');
  const count = document.getElementById('wordCount');
  
  panel.style.display = sessionWords.length > 0 ? 'block' : 'none';
  count.textContent = `(${sessionWords.length}词)`;
  
  tags.innerHTML = sessionWords.map(w => `
    <span class="word-tag ${w.status}" title="${w.zh}">
      ${w.en}
      <span style="font-size:0.7em;margin-left:4px;">${w.zh}</span>
    </span>
  `).join('');
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && mode==='choice') || (i===1 && mode==='spell'));
  });
  // 重新开始
  startGame();
}

// ==================== 统计 ====================
function updateStats() {
  const allWords = getWordsForLevel(3);
  const mastered = allWords.filter(w => getWordStatus(w.en).box >= 4).length;
  const total = allWords.length;
  
  document.getElementById('statMastered').textContent = mastered;
  document.getElementById('statStreak').textContent = currentStreak;
  document.getElementById('statToday').textContent = todayCount;
  
  const totalAttempts = Object.values(wordState).reduce((sum, s) => sum + s.correct + s.wrong, 0);
  const totalCorrect = Object.values(wordState).reduce((sum, s) => sum + s.correct, 0);
  const acc = totalAttempts > 0 ? Math.round(totalCorrect / totalAttempts * 100) : 0;
  document.getElementById('statAccuracy').textContent = acc + '%';
  
  const pct = Math.round(mastered / total * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
  
  renderLevelBadges();
}

function renderLevelBadges() {
  const row = document.getElementById('levelRow');
  const level1Words = WORD_BANK.level1;
  const mastered1 = level1Words.filter(w => getWordStatus(w.en).box >= 4).length;
  const pct1 = Math.round(mastered1 / level1Words.length * 100);
  
  const allL2 = [...WORD_BANK.level1, ...WORD_BANK.level2];
  const mastered2 = allL2.filter(w => getWordStatus(w.en).box >= 4).length;
  const pct2 = Math.round(mastered2 / allL2.length * 100);
  
  const allL3 = [...allL2, ...WORD_BANK.level3];
  const mastered3 = allL3.filter(w => getWordStatus(w.en).box >= 4).length;
  const pct3 = Math.round(mastered3 / allL3.length * 100);
  
  const badges = [
    { name: '🔰 关卡一', desc: '最高频词', pct: pct1, cls: currentLevel>=1 ? (pct1>=70 ? 'unlocked' : 'active') : 'locked', unlocked: true },
    { name: '⭐ 关卡二', desc: '高频扩展', pct: pct2, cls: currentLevel>=2 ? (pct2>=50 ? 'unlocked' : 'active') : 'locked', unlocked: pct1 >= 60 },
    { name: '🏆 关卡三', desc: '全面掌握', pct: pct3, cls: currentLevel>=3 ? (pct3>=50 ? 'unlocked' : 'active') : 'locked', unlocked: pct2 >= 50 }
  ];
  
  row.innerHTML = badges.map((b,i) => `
    <div class="level-badge ${b.cls}" onclick="switchLevel(${i+1})" 
         style="cursor:${b.unlocked ? 'pointer' : 'not-allowed'}"
         title="${b.unlocked ? '点击切换到此关卡' : '完成前一关卡解锁'}">
      <div>${b.name}</div>
      <div style="font-size:0.65em;margin:2px 0">${b.desc}</div>
      <div class="star">${'⭐'.repeat(Math.floor(b.pct/20))}</div>
      <div style="font-size:0.7em">${b.pct}%</div>
    </div>
  `).join('');
}

function switchLevel(level) {
  const allL2 = [...WORD_BANK.level1, ...WORD_BANK.level2];
  const mastered1 = WORD_BANK.level1.filter(w => getWordStatus(w.en).box >= 4).length;
  const pct1 = Math.round(mastered1 / WORD_BANK.level1.length * 100);
  const mastered2 = allL2.filter(w => getWordStatus(w.en).box >= 4).length;
  const pct2 = Math.round(mastered2 / allL2.length * 100);
  
  if (level === 1) {
    currentLevel = 1;
  } else if (level === 2 && pct1 >= 60) {
    currentLevel = 2;
  } else if (level === 3 && pct2 >= 50) {
    currentLevel = 3;
  } else if (level === 2 || level === 3) {
    alert('请先完成前一关卡的掌握（≥60%），再挑战更高关卡！');
    return;
  }
  saveState();
  startGame();
}

// ==================== 键盘快捷键 ====================
document.addEventListener('keydown', e => {
  if (currentMode === 'choice' && isAnswering) {
    const keys = ['1','2','3','4'];
    const idx = keys.indexOf(e.key);
    if (idx >= 0) {
      const btns = document.querySelectorAll('.option-btn');
      if (btns[idx]) btns[idx].click();
    }
  }
  if (e.key === ' ' && !isAnswering && document.querySelector('.result-screen')) {
    e.preventDefault();
    startGame();
  }
});

init();
</script>
